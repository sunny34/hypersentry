<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Hyperliquid - The Future of Decentralized Trading">
    <title>Hyperliquid</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-glow"></div>
    
    <nav class="glass-nav">
        <div class="logo">Hyperliquid</div>
        <div class="nav-links">
            <a href="#trade">Trade</a>
            <a href="#markets">Markets</a>
            <a href="#earn">Earn</a>
            <a href="#stats">Stats</a>
        </div>
        <button class="connect-btn">Connect Wallet</button>
    </nav>

    <main>
        <section class="hero">
            <h1 class="hero-title">
                Trade safely with <br>
                <span class="gradient-text">Zero Compromise</span>
            </h1>
            <p class="hero-subtitle">High performance decentralized exchange with advanced order types and deep liquidity.</p>
            <div class="cta-group">
                <button class="primary-btn">Start Trading</button>
                <button class="secondary-btn">View Markets</button>
            </div>
            
            <div class="stats-preview glass-card">
                <div class="stat-item">
                    <span class="label">24h Volume</span>
                    <span class="value">$142.5M</span>
                </div>
                <div class="stat-item">
                    <span class="label">Total Value Locked</span>
                    <span class="value">$89.2M</span>
                </div>
                <div class="stat-item">
                    <span class="label">Trades</span>
                    <span class="value">1.2M+</span>
                </div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
