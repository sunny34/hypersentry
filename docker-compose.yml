# ============================================
# HyperSentry - Local Development
# docker-compose up --build
# ============================================

services:
  # ----------------------------------------
  # PostgreSQL Database
  # ----------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: hypersentry-db
    environment:
      POSTGRES_USER: hypersentry
      POSTGRES_PASSWORD: hypersentry_dev
      POSTGRES_DB: hypersentry
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hypersentry"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------
  # Redis (for Celery)
  # ----------------------------------------
  redis:
    image: redis:7-alpine
    container_name: hypersentry-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------
  # FastAPI Backend
  # ----------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: base  # Use base for dev (no user switch)
    container_name: hypersentry-api
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://hypersentry:hypersentry_dev@postgres:5432/hypersentry
      - HL_ACCOUNT_ADDRESS=${HL_ACCOUNT_ADDRESS}
      - HL_PRIVATE_KEY=${HL_PRIVATE_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    volumes:
      - .:/app  # Hot reload for development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ----------------------------------------
  # Celery Worker
  # ----------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: base
    container_name: hypersentry-worker
    environment:
      - ENVIRONMENT=development
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://hypersentry:hypersentry_dev@postgres:5432/hypersentry
      - HL_ACCOUNT_ADDRESS=${HL_ACCOUNT_ADDRESS}
      - HL_PRIVATE_KEY=${HL_PRIVATE_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A celery_app worker --loglevel=info

  # ----------------------------------------
  # Next.js Frontend (Dev mode)
  # ----------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: deps  # Just use deps stage for dev
    container_name: hypersentry-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./web:/app
      - /app/node_modules  # Keep node_modules in container
    working_dir: /app
    command: npm run dev
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
